<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Spotlight reveal cursor</title>
<style>
  body {
    margin: 0;
    min-height: 100vh;
    background: #0d0d10;
    cursor: none;
    overflow: hidden;
    position: relative;
  }

  .content {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    color: #eee;
    font-family: sans-serif;
    font-size: 15px;
    text-align: center;
    padding: 40px;
    max-width: 500px;
    margin: 0 auto;
  }

  #spotlight-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 2;
    background: radial-gradient(
      circle 160px at 50% 50%,
      transparent 0%,
      rgba(13, 13, 16, 0.85) 60%,
      #0d0d10 100%
    );
    transition: background 0.05s ease;
  }
</style>
</head>
<body>

<div class="content">
  Move your mouse around — the spotlight reveals what's underneath.
  Great for hero sections or image reveals on a dark background.
</div>

<div id="spotlight-overlay"></div>

<script>
  const overlay = document.getElementById('spotlight-overlay');
  const RADIUS = 160;

  document.addEventListener('mousemove', (e) => {
    overlay.style.background = `radial-gradient(
      circle ${RADIUS}px at ${e.clientX}px ${e.clientY}px,
      transparent 0%,
      rgba(13, 13, 16, 0.85) 60%,
      #0d0d10 100%
    )`;
  });
</script>

</body>
</html>
